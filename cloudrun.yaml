apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: compoundingclarity
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Increase timeout to 5 minutes for Claude API calls
        run.googleapis.com/execution-environment: gen2
        # Auto-scaling configuration
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
    spec:
      # Request timeout (max 60 minutes for gen2)
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
        - image: PLACEHOLDER_IMAGE
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '8080'
          resources:
            limits:
              # Increase memory for better performance
              memory: 512Mi
              cpu: '1'
          startupProbe:
            timeoutSeconds: 240
            periodSeconds: 240
            failureThreshold: 1
            tcpSocket:
              port: 8080
